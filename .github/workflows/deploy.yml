name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Building for the custom domain `nothingbuthealthy.in` (root path).
      #
      # `public/CNAME` carries the domain into `out/CNAME` and GitHub Pages
      # uses it to bind the deployment to the custom domain. To revert to the
      # GitHub-Pages project URL (`<username>.github.io/nothingbuthealthy/`):
      #   1. delete `public/CNAME`
      #   2. re-add the env vars:
      #        NEXT_PUBLIC_BASE_PATH=/nothingbuthealthy
      #        NEXT_PUBLIC_SITE_URL=https://<username>.github.io/nothingbuthealthy
      - name: Build (static export)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
