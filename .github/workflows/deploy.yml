name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Building for the GitHub Pages project URL:
      #   https://harshshah056.github.io/nothingbuthealthy/
      #
      # When the custom domain `nothingbuthealthy.in` is live (DNS configured
      # AND custom domain set in repo Settings -> Pages), switch back to the
      # custom-domain build by:
      #   1. removing the two env vars below
      #   2. re-adding `public/CNAME` containing `nothingbuthealthy.in`
      - name: Build (static export)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /nothingbuthealthy
          NEXT_PUBLIC_SITE_URL: https://harshshah056.github.io/nothingbuthealthy

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
